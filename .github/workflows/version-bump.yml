name: Version Bump

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    if: ${{ !contains(github.event.head_commit.message, '[ci-version-bump]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type from merged PR label
        id: bump-type
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].number // empty')
          BUMP=patch
          if [ -n "$PR_NUMBER" ]; then
            LABELS=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json labels --jq '.labels[].name')
            if echo "$LABELS" | grep -qx "bump:major"; then BUMP=major
            elif echo "$LABELS" | grep -qx "bump:minor"; then BUMP=minor
            fi
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Compute and write new version
        id: new-version
        run: |
          LINE=$(grep -m1 -E '^[[:space:]]*version = "[0-9]+\.[0-9]+\.[0-9]+"' build.gradle.kts)
          CURRENT=$(echo "$LINE" | sed -E 's/^[[:space:]]*version = "([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ steps.bump-type.outputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW="$MAJOR.$MINOR.$PATCH"
          sed -i -E "s/^([[:space:]]*version = \")[0-9]+\.[0-9]+\.[0-9]+(\")/\1$NEW\2/" build.gradle.kts
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build.gradle.kts
          git commit -m "chore: bump version to v${{ steps.new-version.outputs.version }} [ci-version-bump]"
          git tag -a "v${{ steps.new-version.outputs.version }}" -m "Release v${{ steps.new-version.outputs.version }}"
          git push --follow-tags origin HEAD:main
