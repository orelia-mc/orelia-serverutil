name: Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        # --refresh-dependencies: orelia-core is resolved as a jitpack "main-SNAPSHOT" (changing
        # module); without this, the GitHub Actions Gradle cache can keep serving a stale
        # resolved artifact from an earlier run even after a newer commit lands on orelia-core's
        # main and jitpack rebuilds - this repo depends on APIs that only exist in that newer
        # commit, so a stale cache hit shows up as a spurious "cannot find symbol" compile error.
        run: ./gradlew build --no-daemon --refresh-dependencies
