name: OreliaServerUtil
version: '${version}'
main: rpg.serverutil.paper.OreliaServerUtilPlugin
api-version: '1.21'
description: Orelia server utility plugin - hub transfer, world setup, scoreboard/tablist API, join messages
folia-supported: false
softdepend: [OreliaCore, OreliaExtra, PlaceholderAPI]
commands:
  suadmin:
    description: OreliaServerUtil admin commands.
    permission: orelia.serverutil.admin
    default: op
  hub:
    description: Send yourself to the hub (server or world, depending on config).
permissions:
  orelia.serverutil.chat.color:
    description: Lets a player use &-color codes (legacy, hex, and custom) directly in chat.
    default: op
