# OreliaServerUtil configuration. Sections are added here as each feature phase lands -
# see orelia-serverutil-CONCEPT.md for the full feature roadmap and README.md for the
# up-to-date command/config reference.
#
# config-version tracks this file's schema. Bump it whenever a new top-level section is
# added - on next startup, ConfigManager appends the new section (with its comments) to any
# existing config.yml that's missing it, without touching anything you've already customized.
# Never bump this for a value-only change (e.g. tweaking a default), only for new/removed keys.
config-version: 1
#
# ============================== PLACEHOLDER CHEAT SHEET ==============================
# Every "format"/"suffix-format"/"placeholder-format" key below (and announce.lines/
# announce.title) is resolved through rpg.serverutil.paper.placeholder.PlaceholderService,
# which understands these tokens:
#
#   Always available (no OreliaCore needed):
#     {online}      - players currently online on this server
#     {max_online}  - this server's player slot limit
#     {tps}         - this server's TPS, 1-minute average, clamped to 20.0
#     {ping}        - the VIEWING player's ping in ms
#     {world}       - the viewing player's current world name
#     {player}/{name} - the viewing player's name
#     {server}      - this server's own name (set it below in "server.name" - Paper has no
#                     built-in way to know what Velocity calls it)
#     {date}        - yyyy-MM-dd
#     {time}        - HH:mm:ss
#
#   OreliaCore-sourced (silently left as literal text if OreliaCore isn't installed):
#     {level}       - the player's OreliaCore level
#     {job}         - the player's current job display name (empty if no job chosen yet)
#     {money}       - the player's OreliaCore balance (whole number)
#     {health}      - the player's CURRENT OreliaCore HP (not vanilla health - this is
#                     Orelia's own RPG health pool)
#     {max_health}  - the player's MAX OreliaCore HP
#
#   If the PlaceholderAPI plugin is also installed, any %placeholder% syntax it supports
#   works too (resolved last, after all tokens above) - e.g. a permissions plugin's
#   %luckperms_prefix% for a rank tag.
# =======================================================================================

# This server's own display name, used by the {server} placeholder above. Leave blank to just
# omit it wherever it's used.
server:
  name: "Orelia"

# Enable this only when this server sits behind a Velocity proxy running
# OreliaServerUtil(Velocity). "channel" must match the Velocity side's config.yml exactly.
# Required for hub.mode: PROXY and for the server-switch join/leave chat messages below
# (join.server-switch-wait-ticks / messages.yml's join.server-switch-(leave-)message).
velocity:
  enabled: true
  channel: "orelia:serverutil"

# /hub behavior. TELEPORT works standalone; PROXY requires OreliaServerUtil(Velocity) to be
# running behind a Velocity proxy (see hub.mode reference in README.md).
hub:
  mode: PROXY   # TELEPORT | PROXY
  teleport:
    world: "world"
    x: 0.5
    y: 100.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0
  proxy:
    request-timeout-seconds: 5

# /suadmin worldsetup <world> [profile] applies a named profile's gamerules in one go.
# Any vanilla gamerule name (see https://minecraft.wiki/w/Game_rule) works as a key.
world-setup:
  profiles:
    default:
      gamerules:
        spawn_mobs: false
        advance_time: false
        advance_weather: false
        keep_inventory: true
        command_block_output: false
        mob_drops: false
        locator_bar: false

# Sidebar scoreboard. Other plugins register lines via rpg.serverutil.api.ScoreboardApi -
# "lines" below is this plugin's own config-driven block (placeholders resolved per-viewer,
# see the cheat sheet above), merged in alongside anything other plugins register. Leave
# "lines" empty to show only what other plugins provide.
scoreboard:
  title: "  &%6Orelia  "
  update-interval-ticks: 20
  # Hides the red score numbers on the right side of the sidebar (Paper 1.20.3+ only;
  # older clients still show the raw number since the format hint is ignored).
  hide-numbers: true
  # Where this block renders relative to other registered ScoreboardLineProviders - higher
  # numbers render nearer the top. OreliaCore's own level/money line (if installed) uses 100.
  lines-priority: 0
  lines:
    - " &%7Online: &%f{online}&%7/&%f{max_online} "
    - " &%7TPS: &%f{tps} "

# Tab-list name prefix/suffix. Other plugins register formatters via
# rpg.serverutil.api.TabListApi - this plugin alone shows nothing by default.
tablist:
  update-interval-ticks: 40
  # Text shown above/below the player list. Each list entry is one line (placeholders
  # resolved per-viewer, see the cheat sheet above). Off by default.
  header-footer:
    enabled: true
    header:
      - "&%6&l{server}"
      - "&%7Online: &%f{online}&%7/&%f{max_online}"
    footer:
      - "&%7TPS: &%f{tps}"

# Text shown below every player's nametag. Two separate pieces, because Minecraft only
# allows ONE shared title per BELOW_NAME objective (it can't vary per target the way the
# value can):
#   - "title" - one label shown below EVERY player, the same for all of them (though it IS
#     resolved per-VIEWER, so e.g. {ping} in here reflects the person looking at it, not the
#     person being looked at). Do NOT put per-player data like {health} here - every player
#     would show the viewer's own value, not their own (this is the #1 mix-up with this
#     section). Static label text (or a viewer-relative token) only.
#   - The actual per-player value (health, level, faction, ...) comes from a registered
#     rpg.serverutil.api.BelownameApi provider instead - see core-integration.belowname.format
#     below for the config-driven one (OreliaCore's {level}/{job}/{health}/{max_health} are
#     genuinely per-TARGET there, since that's what BelownameValueProvider#getValue resolves
#     against). There is no separate "enabled" flag for this whole feature - it shows itself
#     automatically the moment any provider produces a value, and hides again once none do.
belowname:
  title: "&%dSuffix"
  update-interval-ticks: 20

# Chat formatting. {placeholder} is resolved via rpg.serverutil.api.ChatApi (level/title/rank
# from other plugins, empty string if nothing registered) - include any brackets/spacing you
# want around it directly in the provider's own returned text, not here, so the format still
# looks right when the placeholder is empty.
chat:
  enabled: true
  format: "{placeholder}{sender}&%7: &%f{message}"
  # Hover tooltip shown when hovering over a player's name in chat. Each line is resolved
  # through the same PlaceholderService as everything else (see the cheat sheet above) -
  # add/remove lines freely to change what shows.
  tooltip:
    enabled: true
    lines:
      - "&%f{player}"
      - "&%7{time}"
      - "&%7Lv.{level} &%b{job}"
      - "&%a{ping}ms"
  # Lets a player use &-color codes (legacy, &#RRGGBB hex, and OreliaCore's custom &%<char>
  # codes - see ColorUtil) directly in their own chat messages. Gated by the
  # "orelia.serverutil.chat.color" permission (see plugin.yml) - op-only by default, grant it
  # to specific non-op players via a permissions plugin. Players without the permission are
  # unaffected either way - their & codes just show up as literal text, same as vanilla chat.
  color-codes:
    enabled: true
    permission: "orelia.serverutil.chat.color"

# Welcome announcement shown a short delay after join (chat lines + optional title).
announce:
  enabled: true
  delay-ticks: 20
  lines:
    - "&%3==============================="
    - "&%b Welcome to Orelia Debug Server!"
    - "&%3==============================="
  title:
    enabled: true
    title: "&%bOrelia Debug Server"
    subtitle: "&%3Welcome!"

# Shows a quick TPS/online-count summary to operators on join.
admin-healthcheck:
  enabled: true

join:
  # Upper bound (in ticks) JoinMessageModule waits for an incoming SERVER_SWITCH_(LEAVE_)NOTIFY
  # before giving up and falling back to the normal join/quit message - in practice the switch
  # message shows the instant the notify arrives (often faster than this), this is only a
  # safety net for a slow/lagged proxy connection. Only relevant when velocity.enabled is true
  # - ignored otherwise.
  server-switch-wait-ticks: 20

# Feeds OreliaCore's level/job/balance data into this plugin's own display APIs, if
# OreliaCore happens to be installed. Set to false to disable even when OreliaCore is
# present; each sub-section below can also be disabled independently.
core-integration:
  enabled: true
  # Sidebar lines (see scoreboard.lines above for the mechanism - this is a second,
  # independent ScoreboardLineProvider registered at priority 100, so it renders above
  # scoreboard.lines by default).
  scoreboard:
    enabled: true
    lines:
      - "&%fLv. &%e{level}"
      - "&%fG: &%6{money}"
  # Tab-list/nametag color (by job id, "&"-code style) + level suffix. Job ids are whatever
  # OreliaCore's JobApi returns (e.g. FENCER/WARRIOR/ARCHER) - add/remove keys to match your
  # jobs.yml, unmapped jobs just get no color override.
  tablist:
    enabled: true
    suffix-format: " &%7[Lv.{level}]"
    # NOTE: these must stay plain legacy &-codes (&0-&9/&a-&f), NOT the &%-prefixed custom
    # palette used everywhere else in this config - a job color feeds a scoreboard Team's
    # color (org.bukkit.scoreboard.Team#setColor), which only accepts the 16 legacy
    # org.bukkit.ChatColor values, not arbitrary hex. See CoreIntegrationModule#parseJobColors.
    job-colors:
      FENCER: "&b"
      WARRIOR: "&c"
      ARCHER: "&a"
  # Level shown on the right side of the tab-list entry.
  tablist-value:
    enabled: true
    format: "&%a{ping}ms"
  # Shown below the nametag, resolved per-TARGET (unlike belowname.title above, this genuinely
  # differs per player) - add {health}/{max_health} here if you want each player's HP to show
  # under their own nametag, e.g. "&%7Lv.{level} {job} &%c{health}&%7/&%c{max_health}".
  belowname:
    enabled: true
    format: "&%7Lv.{level} {job}"
  # Level + job shown next to the sender's name in chat.
  chat:
    enabled: true
    placeholder-format: "&%7[Lv.{level}] &%b{job}&r "
