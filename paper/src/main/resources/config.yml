# OreliaServerUtil configuration. Sections are added here as each feature phase lands -
# see orelia-serverutil-CONCEPT.md for the full feature roadmap and README.md for the
# up-to-date command/config reference.
#
# ============================== PLACEHOLDER CHEAT SHEET ==============================
# Every "format"/"suffix-format"/"placeholder-format" key below (and announce.lines/
# announce.title) is resolved through rpg.serverutil.paper.placeholder.PlaceholderService,
# which understands these tokens:
#
#   Always available (no OreliaCore needed):
#     {online}      - players currently online on this server
#     {max_online}  - this server's player slot limit
#     {tps}         - this server's TPS, 1-minute average, clamped to 20.0
#     {ping}        - the VIEWING player's ping in ms
#     {world}       - the viewing player's current world name
#     {player}/{name} - the viewing player's name
#     {server}      - this server's own name (set it below in "server.name" - Paper has no
#                     built-in way to know what Velocity calls it)
#     {date}        - yyyy-MM-dd
#     {time}        - HH:mm:ss
#
#   OreliaCore-sourced (silently left as literal text if OreliaCore isn't installed):
#     {level}       - the player's OreliaCore level
#     {job}         - the player's current job display name (empty if no job chosen yet)
#     {money}       - the player's OreliaCore balance (whole number)
#     {health}      - the player's CURRENT OreliaCore HP (not vanilla health - this is
#                     Orelia's own RPG health pool)
#     {max_health}  - the player's MAX OreliaCore HP
#
#   If the PlaceholderAPI plugin is also installed, any %placeholder% syntax it supports
#   works too (resolved last, after all tokens above) - e.g. a permissions plugin's
#   %luckperms_prefix% for a rank tag.
# =======================================================================================

# This server's own display name, used by the {server} placeholder above and by
# server-switch-notify's {server} token. Leave blank to just omit it wherever it's used.
server:
  name: ""

# Enable this only when this server sits behind a Velocity proxy running
# OreliaServerUtil(Velocity). "channel" must match the Velocity side's config.yml exactly.
# Required for hub.mode: PROXY and for showing title/subtitle on incoming
# server-switch-notify (see below).
velocity:
  enabled: false
  channel: "orelia:serverutil"

# /hub behavior. TELEPORT works standalone; PROXY requires OreliaServerUtil(Velocity) to be
# running behind a Velocity proxy (see hub.mode reference in README.md).
hub:
  mode: TELEPORT   # TELEPORT | PROXY
  teleport:
    world: "world"
    x: 0.5
    y: 100.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0
  proxy:
    request-timeout-seconds: 5

# /suadmin worldsetup <world> [profile] applies a named profile's gamerules in one go.
# Any vanilla gamerule name (see https://minecraft.wiki/w/Game_rule) works as a key.
world-setup:
  profiles:
    default:
      gamerules:
        spawn_mobs: false
        advance_time: false
        advance_weather: false
        keep_inventory: true
        command_block_output: false
        mob_drops: false
        locator_bar: false

# Sidebar scoreboard. Other plugins register lines via rpg.serverutil.api.ScoreboardApi -
# this plugin alone shows nothing by default.
scoreboard:
  title: "&6Orelia"
  update-interval-ticks: 20
  # Hides the red score numbers on the right side of the sidebar (Paper 1.20.3+ only;
  # older clients still show the raw number since the format hint is ignored).
  hide-numbers: true

# Tab-list name prefix/suffix. Other plugins register formatters via
# rpg.serverutil.api.TabListApi - this plugin alone shows nothing by default.
tablist:
  update-interval-ticks: 40
  # Text shown above/below the player list. Each list entry is one line (placeholders
  # resolved per-viewer, see the cheat sheet above). Off by default.
  header-footer:
    enabled: false
    header:
      - "&6&l{server}"
      - "&7Online: &f{online}&7/&f{max_online}"
    footer:
      - "&7TPS: &f{tps}"

# Text shown below every player's nametag (health, faction, ...). Other plugins register
# values via rpg.serverutil.api.BelownameApi. Off by default - once enabled, "title" is shown
# to everyone even without a registered provider.
belowname:
  enabled: false
  title: "&dSuffix"
  update-interval-ticks: 20

# Chat formatting. {placeholder} is resolved via rpg.serverutil.api.ChatApi (level/title/rank
# from other plugins, empty string if nothing registered) - include any brackets/spacing you
# want around it directly in the provider's own returned text, not here, so the format still
# looks right when the placeholder is empty.
chat:
  enabled: true
  format: "{placeholder}{sender}&7: &f{message}"

# Welcome announcement shown a short delay after join (chat lines + optional title).
announce:
  enabled: true
  delay-ticks: 20
  lines:
    - "&6==============================="
    - "&fOreliaサーバーへようこそ！"
    - "&6==============================="
  title:
    enabled: true
    title: "&6Orelia Server"
    subtitle: "&eWelcome!"

# Shows a quick TPS/online-count summary to operators on join.
admin-healthcheck:
  enabled: true

# Title/subtitle shown when this server receives a SERVER_SWITCH_NOTIFY from the Velocity
# proxy (a player just landed here from another backend). Requires velocity.enabled: true.
# Note: {server} here is a special case, NOT the PlaceholderService token from the cheat
# sheet above - it's always the live destination server name Velocity itself reported for
# this specific switch, regardless of what "server.name" is set to.
server-switch-notify:
  enabled: true
  title: "&6Orelia"
  subtitle: "&7Server Switched to {server}."

join:
  # How long (in ticks) JoinMessageModule waits for an incoming SERVER_SWITCH_(LEAVE_)NOTIFY
  # before falling back to the normal join/quit message. Only relevant when velocity.enabled
  # is true - ignored otherwise.
  server-switch-wait-ticks: 5

# Feeds OreliaCore's level/job/balance data into this plugin's own display APIs, if
# OreliaCore happens to be installed. Set to false to disable even when OreliaCore is
# present; each sub-section below can also be disabled independently.
core-integration:
  enabled: true
  # Tab-list/nametag color (by job id, "&"-code style) + level suffix. Job ids are whatever
  # OreliaCore's JobApi returns (e.g. FENCER/WARRIOR/ARCHER) - add/remove keys to match your
  # jobs.yml, unmapped jobs just get no color override.
  tablist:
    enabled: true
    suffix-format: " &7[Lv.{level}]"
    job-colors:
      FENCER: "&b"
      WARRIOR: "&c"
      ARCHER: "&a"
  # Level shown on the right side of the tab-list entry.
  tablist-value:
    enabled: true
    format: "&a{ping}ms"
  # Job display name shown below the nametag.
  belowname:
    enabled: true
    format: "&7Lv.{level} {job}"
  # Level + job shown next to the sender's name in chat.
  chat:
    enabled: true
    placeholder-format: "&7[Lv.{level}] &b{job}&r "
